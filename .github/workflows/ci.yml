name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-winit:
    name: winit / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04-arm }
          - { target: x86_64-pc-windows-msvc,    os: windows-latest }
          - { target: x86_64-apple-darwin,       os: macos-15-intel }
          - { target: aarch64-apple-darwin,      os: macos-14 }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: winit

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libxcb1-dev libxkbcommon-dev libwayland-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y

      - run: make winit

      - name: Package
        shell: bash
        run: |
          mkdir staging
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/release/wef_winit.exe staging/
            cd staging && 7z a ../wef-winit-${{ matrix.target }}.zip *
          else
            cp target/release/wef_winit staging/
            tar czf wef-winit-${{ matrix.target }}.tar.gz -C staging .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: wef-winit-${{ matrix.target }}
          path: |
            wef-winit-${{ matrix.target }}.tar.gz
            wef-winit-${{ matrix.target }}.zip

  build-webview:
    name: webview / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04-arm }
          - { target: x86_64-pc-windows-msvc,    os: windows-latest }
          - { target: x86_64-apple-darwin,       os: macos-15-intel }
          - { target: aarch64-apple-darwin,      os: macos-14 }
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm ninja

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install make ninja -y
          nuget install Microsoft.Web.WebView2 -OutputDirectory packages

      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'

      - name: Build
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            WEBVIEW2_ROOT="$(ls -d packages/Microsoft.Web.WebView2.* | head -1)" make webview
          else
            make webview
          fi

      - name: Package
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            tar czf wef-webview-${{ matrix.target }}.tar.gz -C webview/build wef_webview.app
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            cd webview/build && 7z a ../../wef-webview-${{ matrix.target }}.zip wef_webview.exe
          else
            tar czf wef-webview-${{ matrix.target }}.tar.gz -C webview/build wef_webview
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: wef-webview-${{ matrix.target }}
          path: |
            wef-webview-${{ matrix.target }}.tar.gz
            wef-webview-${{ matrix.target }}.zip

  build-cef:
    name: cef / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04-arm }
          - { target: x86_64-apple-darwin,       os: macos-15-intel }
          - { target: aarch64-apple-darwin,      os: macos-14 }
          - { target: x86_64-pc-windows-msvc,    os: windows-latest }
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config \
            libx11-dev libglib2.0-dev libnss3-dev libnspr4-dev \
            libatk1.0-dev libatk-bridge2.0-dev libcups2-dev libdrm-dev \
            libgtk-3-dev libgbm-dev libasound2-dev libpango1.0-dev \
            libcairo2-dev libxcomposite-dev libxdamage-dev libxrandr-dev \
            libxkbcommon-dev libdbus-1-dev libxext-dev libxfixes-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm ninja

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install make ninja -y

      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'

      - name: Cache CEF
        uses: actions/cache@v4
        with:
          path: vendor/cef
          key: cef-${{ matrix.os }}-${{ runner.arch }}

      - run: make cef

      - name: Package
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            tar czf wef-cef-${{ matrix.target }}.tar.gz -C cef/build/Release wef.app
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            cd cef/build/Release && 7z a ../../../wef-cef-${{ matrix.target }}.zip *
          else
            tar czf wef-cef-${{ matrix.target }}.tar.gz -C cef/build/Release .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: wef-cef-${{ matrix.target }}
          path: |
            wef-cef-${{ matrix.target }}.tar.gz
            wef-cef-${{ matrix.target }}.zip

  build-servo:
    name: servo / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04-arm }
          - { target: x86_64-apple-darwin,       os: macos-15-intel }
          - { target: aarch64-apple-darwin,      os: macos-14 }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: servo

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config cmake python3 perl m4 yasm nasm \
            libfontconfig1-dev libfreetype-dev libunwind-dev \
            libx11-dev libxcb1-dev libxcursor-dev libxrandr-dev libxi-dev \
            libxkbcommon-dev libdbus-1-dev libudev-dev \
            libvulkan-dev libgl-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            libclang-dev clang llvm

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm cmake yasm nasm

      - run: make servo

      - name: Package
        shell: bash
        run: |
          mkdir staging
          cp target/release/wef_servo staging/
          tar czf wef-servo-${{ matrix.target }}.tar.gz -C staging .

      - uses: actions/upload-artifact@v4
        with:
          name: wef-servo-${{ matrix.target }}
          path: wef-servo-${{ matrix.target }}.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-winit, build-webview, build-cef, build-servo]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
