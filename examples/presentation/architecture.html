<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      body {
        background: #fff;
        color: #111;
        font-family: system-ui, -apple-system, sans-serif;
        padding: 48px;
        max-width: 900px;
        margin: 0 auto;
      }
      h1 {
        font-size: 28px;
        margin-bottom: 36px;
        text-align: center;
      }
      .layer {
        display: flex;
        align-items: center;
        gap: 24px;
      }
      .box {
        border: 2px solid #111;
        border-radius: 6px;
        padding: 12px 20px;
        text-align: center;
        font-weight: 600;
        font-size: 16px;
        flex: 1;
      }
      .row {
        display: flex;
        gap: 12px;
        flex: 1;
      }
      .row .box {
        flex: 1;
      }
      .dashed {
        border-style: dashed;
      }
      .gray {
        border-color: #bbb;
        color: #888;
      }
      .arrow {
        text-align: center;
        font-size: 18px;
        color: #999;
        margin: 6px 0;
        padding-right: 180px;
      }
      .note {
        width: 160px;
        flex-shrink: 0;
        text-align: left;
        font-size: 13px;
        color: #888;
        font-style: italic;
      }
      .mono {
        font-family: "SF Mono", monospace;
        font-size: 12px;
        font-style: normal;
      }
    </style>
  </head>
  <body>
    <div class="layer">
      <div class="box">Your App</div>
      <div class="note">
        <span class="mono">deno compile --app</span> generates .dll
      </div>
    </div>

    <div class="arrow">▼</div>

    <div class="layer">
      <div class="box dashed">C API</div>
      <div class="note">Stable ABI boundary</div>
    </div>

    <div class="arrow">▼</div>

    <div class="layer">
      <div class="row">
        <div class="box">CEF</div>
        <div class="box">Webview</div>
        <div class="box gray">Servo</div>
      </div>
      <div class="note">Ships with WEF</div>
    </div>
  </body>
</html>
