# wef

deno, but for the desktop.

pick your browser engine. keep your stack.
ship native apps from web code.

*you're looking at wef right now*
---
## desktop apps are kind of a mess

**Electron** ships a whole Chromium. **150MB** just to say hello.

**Tauri** uses the system webview. way lighter.
but you're locked to one engine and its quirks.

what if you could just... **pick?**
</textarea>

## rust in, js out

write an `#[op2]` in Rust, get a JS class for free

```rust
#[op2]
impl BrowserWindow {
    #[constructor]
    fn new(width: i32, height: i32) -> BrowserWindow {
        set_window_size(width, height);
        BrowserWindow {}
    }

    #[fast]
    fn load_url(&self, url: &str) {
        navigate(url);
    }
}
```

```js
// and in javascript:
const win = new BrowserWindow(1024, 768);
win.loadUrl("https://example.com");
```
---
## the endgame: `deno compile`

```sh
$ deno compile --target desktop index.html
$ deno compile fresh/main.ts
```

your **Fresh app** → native app
your **static site** → native app

no config. no bundler. just compile.
---
## pick your engine

|        | CEF       | WebView         | Servo              |
|--------|-----------|-----------------|--------------------|
| what   | Chromium  | platform native | Rust browser engine|
| size   | ~100 MB   | ~0              | ~15 MB             |
| compat | full Chrome| varies         | growing fast       |
| vibe   | max compat| ship tiny       | rust-native        |

same code, different tradeoffs. your call.
